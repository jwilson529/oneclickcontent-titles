<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sparkleGradient" x1="19" y1="11" x2="45" y2="51" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="0.52" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#B75B22"/>
    </linearGradient>
    <linearGradient id="sparkleCore" x1="24" y1="20" x2="39" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <radialGradient id="sparkleHalo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(32 30.5) rotate(90) scale(21 21)">
      <stop offset="0" stop-color="#FFF7ED" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#FDBA74" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <style>
      .sparkle-piece {
        transform-box: fill-box;
        transform-origin: center;
      }

      .sparkle-halo {
        transform-box: fill-box;
        transform-origin: center;
        animation: haloPulse 3.8s ease-in-out infinite;
      }

      .sparkle-main {
        animation: mainSpark 3.8s infinite;
      }

      .sparkle-secondary-a {
        animation: sideSparkA 4.4s infinite -0.55s;
      }

      .sparkle-secondary-b {
        animation: sideSparkB 4.1s infinite -1.3s;
      }

      .sparkle-dot-a {
        animation: dotFloatA 3.5s ease-in-out infinite -0.35s;
      }

      .sparkle-dot-b {
        animation: dotFloatB 3.9s ease-in-out infinite -1.05s;
      }

      @keyframes haloPulse {
        0%,
        18%,
        100% {
          opacity: 0.18;
          transform: scale(0.92);
        }

        28% {
          opacity: 0.38;
          transform: scale(1.08);
        }

        37% {
          opacity: 0.16;
          transform: scale(0.96);
        }

        45% {
          opacity: 0.24;
          transform: scale(1.01);
        }
      }

      @keyframes mainSpark {
        0%,
        16%,
        100% {
          transform: rotate(0deg) scale(1);
        }

        25% {
          transform: rotate(15deg) scale(1.08);
        }

        33% {
          transform: rotate(-10deg) scale(0.96);
        }

        40% {
          transform: rotate(6deg) scale(1.03);
        }

        47% {
          transform: rotate(0deg) scale(1);
        }
      }

      @keyframes sideSparkA {
        0%,
        22%,
        100% {
          transform: rotate(0deg) scale(1);
        }

        30% {
          transform: rotate(-18deg) scale(1.12);
        }

        39% {
          transform: rotate(11deg) scale(0.95);
        }

        47% {
          transform: rotate(-5deg) scale(1.02);
        }

        54% {
          transform: rotate(0deg) scale(1);
        }
      }

      @keyframes sideSparkB {
        0%,
        20%,
        100% {
          transform: rotate(0deg) scale(1);
        }

        29% {
          transform: rotate(12deg) scale(1.11);
        }

        37% {
          transform: rotate(-9deg) scale(0.94);
        }

        44% {
          transform: rotate(4deg) scale(1.03);
        }

        51% {
          transform: rotate(0deg) scale(1);
        }
      }

      @keyframes dotFloatA {
        0%,
        100% {
          opacity: 0.65;
          transform: translate(0, 0) scale(1);
        }

        30% {
          opacity: 1;
          transform: translate(-1px, -1.5px) scale(1.22);
        }

        48% {
          opacity: 0.72;
          transform: translate(0.5px, 0.75px) scale(0.94);
        }
      }

      @keyframes dotFloatB {
        0%,
        100% {
          opacity: 0.8;
          transform: translate(0, 0) scale(1);
        }

        26% {
          opacity: 1;
          transform: translate(1px, -1px) scale(1.16);
        }

        43% {
          opacity: 0.72;
          transform: translate(-0.75px, 1px) scale(0.92);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .sparkle-halo,
        .sparkle-main,
        .sparkle-secondary-a,
        .sparkle-secondary-b,
        .sparkle-dot-a,
        .sparkle-dot-b {
          animation: none;
        }
      }
    </style>
  </defs>

  <g class="sparkle-halo">
    <circle cx="32" cy="30.5" r="20.5" fill="url(#sparkleHalo)"/>
    <circle cx="32" cy="30.5" r="16.25" stroke="#F59E0B" stroke-opacity="0.16" stroke-width="1.5"/>
  </g>

  <g class="sparkle-piece sparkle-main">
    <path d="M32 8.5C34.71 23.07 39.43 27.79 54 30.5C39.43 33.21 34.71 37.93 32 52.5C29.29 37.93 24.57 33.21 10 30.5C24.57 27.79 29.29 23.07 32 8.5Z" fill="url(#sparkleGradient)" stroke="#7C2D12" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M32 18.5C33.45 26.15 35.85 28.55 43.5 30C35.85 31.45 33.45 33.85 32 41.5C30.55 33.85 28.15 31.45 20.5 30C28.15 28.55 30.55 26.15 32 18.5Z" fill="url(#sparkleCore)"/>
  </g>

  <g class="sparkle-piece sparkle-secondary-a">
    <path d="M49 10.5C49.91 15.09 51.41 16.59 56 17.5C51.41 18.41 49.91 19.91 49 24.5C48.09 19.91 46.59 18.41 42 17.5C46.59 16.59 48.09 15.09 49 10.5Z" fill="#FDE68A" stroke="#8A3412" stroke-width="1.25" stroke-linejoin="round"/>
  </g>

  <g class="sparkle-piece sparkle-secondary-b">
    <path d="M15 38.5C15.68 41.93 16.82 43.07 20.25 43.75C16.82 44.43 15.68 45.57 15 49C14.32 45.57 13.18 44.43 9.75 43.75C13.18 43.07 14.32 41.93 15 38.5Z" fill="#FFF1E5" stroke="#8A3412" stroke-width="1.25" stroke-linejoin="round"/>
  </g>

  <g class="sparkle-piece sparkle-dot-a">
    <circle cx="20.5" cy="17.5" r="1.75" fill="#8A3412" opacity="0.72"/>
  </g>

  <g class="sparkle-piece sparkle-dot-b">
    <circle cx="43.5" cy="44.5" r="2" fill="#B75B22" opacity="0.82"/>
  </g>
</svg>
