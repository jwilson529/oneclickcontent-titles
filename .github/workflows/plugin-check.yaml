name: CI and Release

on:
  pull_request:
  push:
    branches:
      - main
      - 'releases/*'
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  validate:
    name: Validate plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        run: npm run check

      - name: Run PHPUnit
        run: npm test

      - name: Build release zip
        run: npm run dist

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: oneclickcontent-titles-release-zip
          path: dist/oneclickcontent-titles.zip
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to WordPress.org
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Checkout code (full history & tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build ZIP
        run: npm run dist

      - name: Deploy to WP.org SVN
        id: wporg_deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.WPORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_PASSWORD }}
          SLUG: oneclickcontent-titles
          BUILD_DIR: dist/oneclickcontent-titles
          ASSETS_DIR: assets

      - name: Attach release zip to GitHub release
        if: steps.wporg_deploy.outputs.zip-path != ''
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.wporg_deploy.outputs.zip-path }}
          overwrite_files: true
